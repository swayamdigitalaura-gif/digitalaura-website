# www → non-www redirect (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.thedigitalaura.com;

    ssl_certificate /etc/letsencrypt/live/thedigitalaura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thedigitalaura.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://thedigitalaura.com$request_uri;
}

# Main site
server {
    server_name thedigitalaura.com;

    root /home/digitalaura.temp/public_html;
    index index.html;

    client_max_body_size 50M;

    # Dynamic redirects from admin panel (auto-generated)
    include /etc/nginx/da-redirects.conf;

    # Block sitemap_index.xml
    location = /sitemap_index.xml {
        return 404;
    }

    location ^~ /uploads/ {
        proxy_pass http://localhost:5002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://localhost:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin-panel/ {
        alias /home/digitalaura.temp/public_html/admin-panel/;
        try_files $uri $uri/ /admin-panel/index.html;
    }

    # SEO landing page
    location /seo-services-ahmedabad {
        proxy_pass http://localhost:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Google Ads landing page
    location /google-ads-agency-ahmedabad {
        proxy_pass http://localhost:5004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/thedigitalaura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thedigitalaura.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name thedigitalaura.com www.thedigitalaura.com;
    return 301 https://thedigitalaura.com$request_uri;
}
